apiVersion: v1
kind: ServiceAccount
metadata:
  name: ml-inference-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ml-inference-role
rules:
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ml-inference-rolebinding
subjects:
  - kind: ServiceAccount
    name: ml-inference-sa
roleRef:
  kind: Role
  name: ml-inference-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-inference-server
  labels:
    app: ml-inference-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-inference-server
  template:
    metadata:
      labels:
        app: ml-inference-server
    spec:
      serviceAccountName: ml-inference-sa # This is where the service account is attached to the deployment.
      containers:
        - name: inference-server
          image: ghcr.io/ilay9405/k8s-predictive-autoscaling-project:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: PROMETHEUS_URL
              value: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
---
apiVersion: v1
kind: Service
metadata:
  name: ml-inference-service
  labels:
    app: ml-inference-server
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: ml-inference-server
