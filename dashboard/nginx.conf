server {
    listen 80;

    # Serve the static React files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # If the file isn't found, fallback to index.html (Required for React Router)
        try_files $uri $uri/ /index.html;
    }

    # Forward any API requests to the God Mode Python server inside the cluster
    location /api/ {
        proxy_pass http://ml-inference-service.predscalens.svc.cluster.local:8000;
        
        # Standard proxy headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
